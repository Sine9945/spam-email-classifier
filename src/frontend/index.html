<!DOCTYPE html>
<html>
<head>
    <title>Spam Email Classifier</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f2f2f2;
            margin-top: 100px;
        }

        textarea {
            width: 60%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Spam Email Detector</h1>

    <textarea id="emailText" placeholder="Enter message..."></textarea>
    <br><br>

    <button onclick="checkSpam()">Check Spam</button>

    <div id="result"></div>

    <script>
        async function checkSpam() {

            let text = document.getElementById("emailText").value;
            let result = document.getElementById("result");

            if (text.trim() === "") {
                result.innerText = "Please enter a message!";
                return;
            }

            result.innerText = "Checking...";

            try {
                let response = await fetch("http://127.0.0.1:5000/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email: text })
                });

                let data = await response.json();

                if (data.prediction.toLowerCase() === "spam") {
                    result.innerText = "Spam";
                } else {
                    result.innerText = "Not Spam";
                }

            } catch (error) {
                result.innerText = "Server not running";
            }
        }
    </script>

</body>
</html>
